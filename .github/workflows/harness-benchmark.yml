name: TCP Harness Benchmark

on:
  push:
    branches: [main]
    paths:
      - 'tcp/**'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'tcp/**'
      - 'tests/**'

jobs:
  harness-benchmark:
    name: Harness Regression Guardrail
    runs-on: ubuntu-latest
    env:
      POETRY_VERSION: "1.6.1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install dependencies
        run: poetry install --with dev,test

      - name: Run TCP-focused unit tests
        run: poetry run pytest tests/unit/test_cc_proxy_*.py tests/unit/test_shadow_freshness.py tests/unit/test_conservative_live_filtering.py tests/unit/derivation/test_request_derivation.py -v

      - name: Run benchmark suite
        run: poetry run python -m tcp.harness.run_benchmark --repetitions 5 --output benchmark-summary.json

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary
          path: benchmark-summary.json
